apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-assistant
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-assistant-readonly
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-assistant-readonly-binding
subjects:
  - kind: ServiceAccount
    name: k8s-ai-assistant
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-ai-assistant-readonly
  apiGroup: rbac.authorization.k8s.io